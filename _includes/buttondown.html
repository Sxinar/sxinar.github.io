<div class="card w-100 my-4 border-0" style="background-color: var(--card-bg); border: 1px solid var(--card-border-color) !important;">
  <div class="card-body p-4">
    <h4 class="card-title text-center mb-2">Bültene Abone Ol</h4>
    <p class="card-text text-muted text-center small mb-3">
      Yeni yazılardan ve gelişmelerden anında haberdar olmak için e-posta adresini bırakabilirsin.
    </p>
    
    <form
      action="https://buttondown.com/api/emails/embed-subscribe/sxinar"
      method="post"
      class="embeddable-buttondown-form d-flex flex-column gap-2 mx-auto"
      style="max-width: 400px;"
    >
      <div class="form-group mb-0">
        <label for="bd-email" class="sr-only">E-posta adresiniz</label>
        <input 
          type="email" 
          name="email" 
          id="bd-email" 
          class="form-control text-center" 
          placeholder="E-posta adresinizi girin..." 
          required 
        />
      </div>
      <button type="submit" class="btn btn-primary w-100 font-weight-bold">
        Abone Ol
      </button>
      
      <p class="text-center small text-muted mt-2 mb-0">
        <a href="https://buttondown.com/refer/sxinar" target="_blank" class="text-muted text-decoration-none">
          ⚡ Powered by Buttondown
        </a>
      </p>
    </form>
  </div>
</div>
