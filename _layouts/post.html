---
layout: default
---

<article class="post">

  <!-- Başlık & meta -->
  <header class="post-header">
    <h1 class="post-title">{{ page.title | xml_escape }}</h1>
    <p class="post-meta">
      {{ page.date | date: "%B %d, %Y" }}
    </p>
  </header>

  <!-- İçerik -->
  <div class="post-content">
    {{ content }}
  </div>

  <!-- **Wombat yorum widget’ı** burada -->
  {% include wombat-comments.html %}

</article>
